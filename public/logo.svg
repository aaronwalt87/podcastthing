<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4c4a0"/>
      <stop offset="100%" stop-color="#b8a880"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5ead8"/>
      <stop offset="100%" stop-color="#e8d8c0"/>
    </linearGradient>
  </defs>

  <!-- Outer beige body -->
  <rect x="20" y="100" width="472" height="312" rx="16" ry="16" fill="url(#bodyGrad)" stroke="#a09070" stroke-width="3"/>

  <!-- Inset shadow on top edge -->
  <rect x="20" y="100" width="472" height="8" rx="4" fill="#c4b488" opacity="0.6"/>

  <!-- Corner screws -->
  <circle cx="50"  cy="130" r="10" fill="#c4b080" stroke="#a09060" stroke-width="2"/>
  <line x1="44" y1="130" x2="56" y2="130" stroke="#8a7840" stroke-width="1.5"/>
  <line x1="50" y1="124" x2="50" y2="136" stroke="#8a7840" stroke-width="1.5"/>

  <circle cx="462" cy="130" r="10" fill="#c4b080" stroke="#a09060" stroke-width="2"/>
  <line x1="456" y1="130" x2="468" y2="130" stroke="#8a7840" stroke-width="1.5"/>
  <line x1="462" y1="124" x2="462" y2="136" stroke="#8a7840" stroke-width="1.5"/>

  <circle cx="50"  cy="382" r="10" fill="#c4b080" stroke="#a09060" stroke-width="2"/>
  <line x1="44" y1="382" x2="56" y2="382" stroke="#8a7840" stroke-width="1.5"/>
  <line x1="50" y1="376" x2="50" y2="388" stroke="#8a7840" stroke-width="1.5"/>

  <circle cx="462" cy="382" r="10" fill="#c4b080" stroke="#a09060" stroke-width="2"/>
  <line x1="456" y1="382" x2="468" y2="382" stroke="#8a7840" stroke-width="1.5"/>
  <line x1="462" y1="376" x2="462" y2="388" stroke="#8a7840" stroke-width="1.5"/>

  <!-- Label area -->
  <rect x="72" y="114" width="368" height="150" rx="4" fill="url(#labelGrad)" stroke="#c0a878" stroke-width="1.5"/>

  <!-- Red stripe at top of label -->
  <rect x="72" y="114" width="368" height="24" rx="4" fill="#cc2010"/>
  <rect x="72" y="130" width="368" height="8" fill="#aa1a0a"/>

  <!-- STEREO text on stripe -->
  <text x="256" y="131" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" font-weight="bold" letter-spacing="6" fill="#f5ead8">STEREO HI-FI</text>

  <!-- Aaron's Mix title -->
  <text x="256" y="176" text-anchor="middle" font-family="'Courier New', monospace" font-size="26" font-weight="bold" letter-spacing="2" fill="#2a1e10">Aaron's Mix</text>

  <!-- Divider lines flanking title -->
  <line x1="82" y1="180" x2="142" y2="180" stroke="#cc2010" stroke-width="1.5"/>
  <line x1="370" y1="180" x2="430" y2="180" stroke="#cc2010" stroke-width="1.5"/>

  <!-- Subtitle -->
  <text x="256" y="202" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" letter-spacing="3" fill="#6b5030">Type II · Chrome · C-90</text>

  <!-- Separator -->
  <line x1="120" y1="214" x2="392" y2="214" stroke="#d0b888" stroke-width="1"/>

  <!-- Red dots -->
  <circle cx="152" cy="228" r="3" fill="#cc2010"/>
  <circle cx="360" cy="228" r="3" fill="#cc2010"/>
  <text x="256" y="231" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" letter-spacing="2" fill="#8a6a40">90 MIN</text>

  <!-- ===== TAPE WINDOW ===== -->
  <rect x="80" y="278" width="352" height="108" rx="10" fill="#1a1208" stroke="#8a7050" stroke-width="2"/>
  <!-- Window shine -->
  <rect x="80" y="278" width="352" height="6" rx="3" fill="#3a2a18" opacity="0.5"/>

  <!-- Tape path -->
  <path d="M 138 332 Q 256 350 374 332" stroke="#5a3a10" stroke-width="3" fill="none"/>

  <!-- LEFT REEL -->
  <circle cx="176" cy="330" r="32" fill="#2a1e10" stroke="#c4b080" stroke-width="2.5"/>
  <circle cx="176" cy="330" r="12" fill="#1a1208" stroke="#d4c090" stroke-width="2"/>
  <line x1="176" y1="298" x2="176" y2="318" stroke="#a09060" stroke-width="2.5"/>
  <line x1="203.7" y1="314" x2="191.8" y2="320.8" stroke="#a09060" stroke-width="2.5"/>
  <line x1="203.7" y1="346" x2="191.8" y2="339.2" stroke="#a09060" stroke-width="2.5"/>
  <line x1="176" y1="362" x2="176" y2="342" stroke="#a09060" stroke-width="2.5"/>
  <line x1="148.3" y1="346" x2="160.2" y2="339.2" stroke="#a09060" stroke-width="2.5"/>
  <line x1="148.3" y1="314" x2="160.2" y2="320.8" stroke="#a09060" stroke-width="2.5"/>
  <circle cx="176" cy="330" r="4" fill="#d4c090"/>

  <!-- RIGHT REEL -->
  <circle cx="336" cy="330" r="32" fill="#2a1e10" stroke="#c4b080" stroke-width="2.5"/>
  <circle cx="336" cy="330" r="12" fill="#1a1208" stroke="#d4c090" stroke-width="2"/>
  <line x1="336" y1="298" x2="336" y2="318" stroke="#a09060" stroke-width="2.5"/>
  <line x1="363.7" y1="314" x2="351.8" y2="320.8" stroke="#a09060" stroke-width="2.5"/>
  <line x1="363.7" y1="346" x2="351.8" y2="339.2" stroke="#a09060" stroke-width="2.5"/>
  <line x1="336" y1="362" x2="336" y2="342" stroke="#a09060" stroke-width="2.5"/>
  <line x1="308.3" y1="346" x2="320.2" y2="339.2" stroke="#a09060" stroke-width="2.5"/>
  <line x1="308.3" y1="314" x2="320.2" y2="320.8" stroke="#a09060" stroke-width="2.5"/>
  <circle cx="336" cy="330" r="4" fill="#d4c090"/>

  <!-- Center guide notch -->
  <rect x="240" y="376" width="32" height="10" rx="2" fill="#2a1e10" stroke="#6a5030" stroke-width="1"/>

  <!-- Bottom row buttons -->
  <rect x="100" y="395" width="18" height="12" rx="2" fill="#cc2010" stroke="#8b1508" stroke-width="1.5"/>
  <rect x="128" y="395" width="18" height="12" rx="2" fill="#cc2010" stroke="#8b1508" stroke-width="1.5"/>
  <rect x="368" y="395" width="18" height="12" rx="2" fill="#cc2010" stroke="#8b1508" stroke-width="1.5"/>
  <rect x="396" y="395" width="18" height="12" rx="2" fill="#cc2010" stroke="#8b1508" stroke-width="1.5"/>

  <!-- Side grip ridges -->
  <line x1="24" y1="220" x2="24" y2="310" stroke="#a09060" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="32" y1="230" x2="32" y2="300" stroke="#a09060" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="488" y1="220" x2="488" y2="310" stroke="#a09060" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="480" y1="230" x2="480" y2="300" stroke="#a09060" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
</svg>
