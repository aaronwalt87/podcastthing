<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient — warm dark brown -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1208"/>
      <stop offset="70%" stop-color="#120a04"/>
      <stop offset="100%" stop-color="#080503"/>
    </radialGradient>

    <!-- Cassette body gradient -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d2a18"/>
      <stop offset="100%" stop-color="#1e1208"/>
    </linearGradient>

    <!-- Label gradient — dark maroon/burgundy -->
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b1a10"/>
      <stop offset="100%" stop-color="#3d0e08"/>
    </linearGradient>

    <!-- Reel gradient -->
    <radialGradient id="reelGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0e0803"/>
      <stop offset="60%" stop-color="#1e1208"/>
      <stop offset="100%" stop-color="#2d1e10"/>
    </radialGradient>

    <!-- Red gradient for stripe -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b1500"/>
      <stop offset="50%" stop-color="#e83020"/>
      <stop offset="100%" stop-color="#8b1500"/>
    </linearGradient>

    <!-- Tan/cream ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a6e50"/>
      <stop offset="25%" stop-color="#4a3020"/>
      <stop offset="50%" stop-color="#c4905a"/>
      <stop offset="75%" stop-color="#4a3020"/>
      <stop offset="100%" stop-color="#8a6e50"/>
    </linearGradient>

    <!-- Red glow filter -->
    <filter id="redGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Tan glow filter -->
    <filter id="tanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="248"/>
    </clipPath>
  </defs>

  <!-- Outer metallic ring -->
  <circle cx="256" cy="256" r="252" fill="url(#ringGrad)" stroke="#c4905a" stroke-width="1"/>
  <circle cx="256" cy="256" r="248" fill="url(#bgGrad)"/>

  <!-- Circuit board background lines — warm tan -->
  <g clip-path="url(#circleClip)" opacity="0.22" stroke="#7a5a38" stroke-width="1" fill="none">
    <line x1="20" y1="80"  x2="180" y2="80"/>
    <line x1="20" y1="120" x2="100" y2="120"/>
    <line x1="330" y1="80" x2="490" y2="80"/>
    <line x1="390" y1="120" x2="490" y2="120"/>
    <line x1="20" y1="380" x2="150" y2="380"/>
    <line x1="20" y1="420" x2="110" y2="420"/>
    <line x1="340" y1="380" x2="490" y2="380"/>
    <line x1="390" y1="420" x2="490" y2="420"/>
    <line x1="80"  y1="20"  x2="80"  y2="160"/>
    <line x1="130" y1="20"  x2="130" y2="110"/>
    <line x1="380" y1="20"  x2="380" y2="160"/>
    <line x1="430" y1="20"  x2="430" y2="110"/>
    <line x1="80"  y1="350" x2="80"  y2="490"/>
    <line x1="130" y1="400" x2="130" y2="490"/>
    <line x1="380" y1="350" x2="380" y2="490"/>
    <line x1="430" y1="400" x2="430" y2="490"/>
    <circle cx="80"  cy="80"  r="4" fill="#7a5a38"/>
    <circle cx="130" cy="120" r="3" fill="#7a5a38"/>
    <circle cx="380" cy="80"  r="4" fill="#7a5a38"/>
    <circle cx="430" cy="120" r="3" fill="#7a5a38"/>
    <circle cx="80"  cy="380" r="4" fill="#7a5a38"/>
    <circle cx="130" cy="420" r="3" fill="#7a5a38"/>
    <circle cx="380" cy="380" r="4" fill="#7a5a38"/>
    <circle cx="430" cy="420" r="3" fill="#7a5a38"/>
  </g>

  <!-- ===== CASSETTE TAPE BODY ===== -->
  <rect x="64" y="158" width="384" height="220" rx="20" ry="20"
        fill="url(#bodyGrad)" stroke="#7a5a38" stroke-width="2.5"/>

  <!-- Top edge highlight -->
  <rect x="64" y="158" width="384" height="6" rx="3"
        fill="none" stroke="#a07850" stroke-width="1" opacity="0.5"/>

  <!-- Screws -->
  <circle cx="95"  cy="185" r="9" fill="#0e0803" stroke="#7a5a38" stroke-width="1.5"/>
  <circle cx="417" cy="185" r="9" fill="#0e0803" stroke="#7a5a38" stroke-width="1.5"/>
  <circle cx="95"  cy="350" r="9" fill="#0e0803" stroke="#7a5a38" stroke-width="1.5"/>
  <circle cx="417" cy="350" r="9" fill="#0e0803" stroke="#7a5a38" stroke-width="1.5"/>
  <line x1="91" y1="185" x2="99" y2="185" stroke="#5a3a20" stroke-width="1"/>
  <line x1="95" y1="181" x2="95" y2="189" stroke="#5a3a20" stroke-width="1"/>
  <line x1="413" y1="185" x2="421" y2="185" stroke="#5a3a20" stroke-width="1"/>
  <line x1="417" y1="181" x2="417" y2="189" stroke="#5a3a20" stroke-width="1"/>
  <line x1="91" y1="350" x2="99" y2="350" stroke="#5a3a20" stroke-width="1"/>
  <line x1="95" y1="346" x2="95" y2="354" stroke="#5a3a20" stroke-width="1"/>
  <line x1="413" y1="350" x2="421" y2="350" stroke="#5a3a20" stroke-width="1"/>
  <line x1="417" y1="346" x2="417" y2="354" stroke="#5a3a20" stroke-width="1"/>

  <!-- Label area -->
  <rect x="114" y="168" width="284" height="130" rx="6" ry="6"
        fill="url(#labelGrad)" stroke="#a03020" stroke-width="1.5"/>

  <!-- Label top red stripe -->
  <rect x="114" y="168" width="284" height="18" rx="4" ry="4"
        fill="url(#redGrad)" filter="url(#redGlow)"/>

  <!-- STEREO badge on stripe -->
  <text x="256" y="181" text-anchor="middle"
        font-family="'Courier New', Courier, monospace" font-size="10"
        font-weight="bold" letter-spacing="4" fill="#f5ead0">STEREO</text>

  <!-- Aaron's Mix label text -->
  <text x="256" y="215" text-anchor="middle"
        font-family="'Courier New', Courier, monospace" font-size="22"
        font-weight="bold" letter-spacing="3" fill="#f5ead0"
        filter="url(#tanGlow)">AARON'S MIX</text>

  <!-- Side lines on label -->
  <line x1="124" y1="222" x2="176" y2="222" stroke="#cc3020" stroke-width="1" opacity="0.7"/>
  <line x1="336" y1="222" x2="388" y2="222" stroke="#cc3020" stroke-width="1" opacity="0.7"/>

  <!-- Type label -->
  <text x="256" y="245" text-anchor="middle"
        font-family="'Courier New', Courier, monospace" font-size="11"
        letter-spacing="2" fill="#d4a882">Type II · Chrome</text>

  <!-- Separator -->
  <line x1="150" y1="254" x2="362" y2="254" stroke="#7a3020" stroke-width="1" opacity="0.5"/>

  <!-- Time indicator -->
  <text x="256" y="270" text-anchor="middle"
        font-family="'Courier New', Courier, monospace" font-size="10"
        letter-spacing="1" fill="#c49070" opacity="0.8">C-90 ◆ 90 MIN</text>

  <!-- Decorative dots -->
  <circle cx="150" cy="235" r="2.5" fill="#e83020" opacity="0.8"/>
  <circle cx="362" cy="235" r="2.5" fill="#e83020" opacity="0.8"/>

  <!-- ===== TAPE WINDOW ===== -->
  <rect x="98" y="308" width="316" height="58" rx="8" ry="8"
        fill="#060402" stroke="#5a3a20" stroke-width="1.5"/>
  <rect x="98" y="308" width="316" height="4" rx="2"
        fill="none" stroke="#7a5038" stroke-width="0.5" opacity="0.6"/>

  <!-- Tape path line -->
  <path d="M 152 337 Q 256 350 360 337" stroke="#cc4820" stroke-width="2.5"
        fill="none" opacity="0.9" filter="url(#redGlow)"/>

  <!-- ===== LEFT REEL ===== -->
  <g filter="url(#tanGlow)">
    <circle cx="185" cy="337" r="26" fill="url(#reelGrad)" stroke="#a07050" stroke-width="2"/>
    <circle cx="185" cy="337" r="10" fill="#0a0603" stroke="#c49070" stroke-width="1.5"/>
    <line x1="185" y1="311" x2="185" y2="325" stroke="#8a5a30" stroke-width="2"/>
    <line x1="207.6" y1="324" x2="197.2" y2="330.7" stroke="#8a5a30" stroke-width="2"/>
    <line x1="207.6" y1="350" x2="197.2" y2="343.3" stroke="#8a5a30" stroke-width="2"/>
    <line x1="185" y1="363" x2="185" y2="349" stroke="#8a5a30" stroke-width="2"/>
    <line x1="162.4" y1="350" x2="172.8" y2="343.3" stroke="#8a5a30" stroke-width="2"/>
    <line x1="162.4" y1="324" x2="172.8" y2="330.7" stroke="#8a5a30" stroke-width="2"/>
    <circle cx="185" cy="337" r="3" fill="#c49070"/>
  </g>

  <!-- ===== RIGHT REEL ===== -->
  <g filter="url(#tanGlow)">
    <circle cx="327" cy="337" r="26" fill="url(#reelGrad)" stroke="#a07050" stroke-width="2"/>
    <circle cx="327" cy="337" r="10" fill="#0a0603" stroke="#c49070" stroke-width="1.5"/>
    <line x1="327" y1="311" x2="327" y2="325" stroke="#8a5a30" stroke-width="2"/>
    <line x1="349.6" y1="324" x2="339.2" y2="330.7" stroke="#8a5a30" stroke-width="2"/>
    <line x1="349.6" y1="350" x2="339.2" y2="343.3" stroke="#8a5a30" stroke-width="2"/>
    <line x1="327" y1="363" x2="327" y2="349" stroke="#8a5a30" stroke-width="2"/>
    <line x1="304.4" y1="350" x2="314.8" y2="343.3" stroke="#8a5a30" stroke-width="2"/>
    <line x1="304.4" y1="324" x2="314.8" y2="330.7" stroke="#8a5a30" stroke-width="2"/>
    <circle cx="327" cy="337" r="3" fill="#c49070"/>
  </g>

  <!-- Center guide -->
  <rect x="240" y="358" width="32" height="12" rx="3"
        fill="#1e1208" stroke="#5a3a20" stroke-width="1"/>
  <line x1="256" y1="358" x2="256" y2="370" stroke="#7a5038" stroke-width="1" opacity="0.6"/>

  <!-- Side grip ridges -->
  <line x1="68"  y1="220" x2="68"  y2="320" stroke="#5a3a20" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="76"  y1="230" x2="76"  y2="310" stroke="#5a3a20" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="444" y1="220" x2="444" y2="320" stroke="#5a3a20" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="436" y1="230" x2="436" y2="310" stroke="#5a3a20" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Bottom edge accent -->
  <line x1="84" y1="374" x2="428" y2="374"
        stroke="#a07050" stroke-width="1.5" opacity="0.5" filter="url(#tanGlow)"/>

  <!-- Bottom text -->
  <text x="256" y="420" text-anchor="middle"
        font-family="'Courier New', Courier, monospace" font-size="18"
        font-weight="bold" letter-spacing="5" fill="#c49070"
        filter="url(#tanGlow)">PODCAST SHOWCASE</text>

  <!-- Decorative dashes flanking bottom text -->
  <line x1="66"  y1="416" x2="106" y2="416" stroke="#e83020" stroke-width="1.5" opacity="0.7"/>
  <line x1="406" y1="416" x2="446" y2="416" stroke="#e83020" stroke-width="1.5" opacity="0.7"/>

  <!-- Outer inner glow ring -->
  <circle cx="256" cy="256" r="247" fill="none" stroke="#7a5038" stroke-width="2" opacity="0.4"
          filter="url(#tanGlow)"/>
</svg>
